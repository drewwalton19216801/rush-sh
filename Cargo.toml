[package]
name = "rush-sh"
version = "0.2.3"
edition = "2021"
description = "A POSIX sh-compatible shell written in Rust"
license = "MIT"
documentation = "https://github.com/drewwalton19216801/rush-sh"
repository = "https://github.com/drewwalton19216801/rush-sh"

[dependencies]
rustyline = { version = "17.0.1", features = ["signal-hook"] }
nix = { version = "0.30.1", features = ["signal"] }
libc = "0.2"
signal-hook = "0.3"
glob = "0.3"
os_pipe = "1.1"
